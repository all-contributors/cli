on:
  push:
    branches:
      - main
      - release-please-types

permissions:
  contents: write
  issues: write
  pull-requests: write

name: Release Please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.CLI_RELEASE_PLEASE_TOKEN }}
          # Use config file for all changelog configuration
          config-file: release-please-config.json
